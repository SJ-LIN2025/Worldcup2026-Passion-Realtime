name: Update state snapshot

on:
  schedule:
    # 每小时整点刷新一次；如需更高频率可再调小
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: update-state-snapshot
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate snapshot
        run: python tools/update_state_snapshot.py

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state_snapshot.json
          git commit -m "chore: refresh state snapshot"
          git push
